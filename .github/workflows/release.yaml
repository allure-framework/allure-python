name: release allure python
run-name: Release ${{ github.ref_name }} by ${{ github.actor }}

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: astral-sh/setup-uv@v7
      with:
        activate-environment: "true"
        python-version: '3.x'

    - name: Install dependencies
      run: uv pip install setuptools wheel twine

    - name: Build and publish
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        pushd allure-python-commons-test
        python setup.py sdist bdist_wheel
        twine upload dist/*
        popd

        pushd allure-python-commons
        python setup.py sdist bdist_wheel
        twine upload dist/*
        popd

        pushd allure-behave
        python setup.py sdist bdist_wheel
        twine upload dist/*
        popd

        pushd allure-nose2
        python setup.py sdist bdist_wheel
        twine upload dist/*
        popd

        pushd allure-pytest
        python setup.py sdist bdist_wheel
        twine upload dist/*
        popd

        pushd allure-pytest-bdd
        python setup.py sdist bdist_wheel
        twine upload dist/*
        popd

        pushd allure-robotframework
        python setup.py sdist bdist_wheel
        twine upload dist/*
        popd
